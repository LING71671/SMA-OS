name: eBPF Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'control-plane/fractal-gateway-ebpf/**'
      - 'control-plane/xtask/**'

jobs:
  build-ebpf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld libelf-dev libbpf-dev protobuf-compiler
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            control-plane/target
          key: ${{ runner.os }}-ebpf-${{ hashFiles('control-plane/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ebpf-
      
      - name: Install bpf-linker
        run: cargo install bpf-linker
      
      - name: Build eBPF program
        run: |
          cd control-plane
          cargo +nightly build -p fractal-gateway-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release
      
      - name: Upload eBPF artifact
        uses: actions/upload-artifact@v4
        with:
          name: fractal-gateway-ebpf
          path: control-plane/target/bpfel-unknown-none/release/fractal-gateway-ebpf
          retention-days: 30
