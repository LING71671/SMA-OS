name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Rust Build and Test (only when Rust code changes)
  # ============================================
  rust-check:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && (
        contains(github.event.head_commit.modified, 'control-plane/') ||
        contains(github.event.head_commit.added, 'control-plane/') ||
        contains(github.event.head_commit.removed, 'control-plane/')
      )
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            control-plane/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cd control-plane && cargo fmt -- --check
        continue-on-error: true

      - name: Run clippy
        run: cd control-plane && cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Run tests
        run: cd control-plane && cargo test --release -p state-engine -p teardown-ctrl -p identity
        continue-on-error: true

  # ============================================
  # Go Build and Test (only when Go code changes)
  # ============================================
  go-check:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && (
        contains(github.event.head_commit.modified, 'memory-bus/') ||
        contains(github.event.head_commit.added, 'memory-bus/') ||
        contains(github.event.head_commit.removed, 'memory-bus/') ||
        contains(github.event.head_commit.modified, 'orchestration/') ||
        contains(github.event.head_commit.added, 'orchestration/') ||
        contains(github.event.head_commit.removed, 'orchestration/')
      )
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download Go modules
        run: |
          cd memory-bus && go mod download
          cd ../orchestration && go mod download

      - name: Run tests (memory-bus)
        run: cd memory-bus && go test -v ./...
        continue-on-error: true

      - name: Run tests (orchestration)
        run: cd orchestration && go test -v ./...
        continue-on-error: true

      - name: Build binaries (memory-bus)
        run: cd memory-bus && go build -o bin/ingestion ./ingestion
        continue-on-error: true

      - name: Build binaries (orchestration)
        run: cd orchestration && go build -o bin/manager ./manager
        continue-on-error: true

  # ============================================
  # Frontend Build
  # ============================================
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if package-lock.json exists
        id: check-package-lock
        run: |
          if [ -f "observability-ui/web-dashboard/package-lock.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check-package-lock.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: observability-ui/web-dashboard/package-lock.json

      - name: Install dependencies
        if: steps.check-package-lock.outputs.exists == 'true'
        run: cd observability-ui/web-dashboard && npm ci
        continue-on-error: true

      - name: Lint
        if: steps.check-package-lock.outputs.exists == 'true'
        run: cd observability-ui/web-dashboard && npm run lint
        continue-on-error: true

      - name: Build
        if: steps.check-package-lock.outputs.exists == 'true'
        run: cd observability-ui/web-dashboard && npm run build
        continue-on-error: true

  # ============================================
  # eBPF Build (Linux only)
  # ============================================
  ebpf-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld libelf-dev libbpf-dev protobuf-compiler

      - name: Cache bpf-linker
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/bpf-linker
          key: ${{ runner.os }}-bpf-linker

      - name: Install bpf-linker
        run: |
          if [ ! -f ~/.cargo/bin/bpf-linker ]; then
            cargo install bpf-linker
          fi

      - name: Build eBPF
        run: |
          cd control-plane
          cargo +nightly build -p fractal-gateway-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release
        continue-on-error: true

      - name: Upload eBPF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-binary
          path: control-plane/target/bpfel-unknown-none/release/fractal-gateway-ebpf

  # ============================================
  # Build Release Artifacts
  # ============================================
  build-release:
    needs: [rust-check, go-check, frontend-check, ebpf-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Rust binaries
        run: |
          cd control-plane
          cargo build --release -p state-engine -p teardown-ctrl -p identity

      - name: Build Go binaries
        run: |
          cd memory-bus && go build -o bin/ingestion ./ingestion
          cd ../orchestration && go build -o bin/manager ./manager

      - name: Download eBPF artifact
        uses: actions/download-artifact@v4
        with:
          name: ebpf-binary
          path: ebpf-artifacts

      - name: Create release archive
        run: |
          mkdir -p release
          cp control-plane/target/release/state-engine release/ || true
          cp control-plane/target/release/teardown-ctrl release/ || true
          cp control-plane/target/release/identity release/ || true
          cp memory-bus/bin/ingestion release/ || true
          cp orchestration/bin/manager release/ || true
          cp ebpf-artifacts/fractal-gateway-ebpf release/ || true
          tar -czvf sma-os-${{ github.ref_name }}-linux-x64.tar.gz -C release .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: sma-os-release
          path: sma-os-*.tar.gz

  # ============================================
  # Create GitHub Release
  # ============================================
  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sma-os-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: sma-os-*.tar.gz
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
