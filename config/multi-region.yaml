# Multi-region deployment configuration for SMA-OS
# Phase 3.2: Scale & Reliability

regions:
  - name: us-east-1
    endpoint: https://api.us-east-1.sma-os.io
    priority: primary
    replicas:
      - host: us-east-1a.sma-os.io
        weight: 100
      - host: us-east-1b.sma-os.io
        weight: 100
      - host: us-east-1c.sma-os.io
        weight: 100
    
  - name: eu-west-1
    endpoint: https://api.eu-west-1.sma-os.io
    priority: secondary
    replicas:
      - host: eu-west-1a.sma-os.io
        weight: 100
      - host: eu-west-1b.sma-os.io
        weight: 100
    
  - name: ap-southeast-1
    endpoint: https://api.ap-southeast-1.sma-os.io
    priority: secondary
    replicas:
      - host: ap-southeast-1a.sma-os.io
        weight: 100

replication:
  # Event log replication between regions
  mode: async  # async or sync
  lag_threshold_ms: 5000  # Max acceptable lag
  conflict_resolution: last-write-wins  # last-write-wins or vector-clock
  
failover:
  # Automatic failover configuration
  health_check_interval: 10s
  failure_threshold: 3
  recovery_time: 30s
  dns_ttl: 60

load_balancing:
  strategy: latency  # latency, round-robin, or weighted
  geo_dns: true
  health_checks:
    interval: 5s
    timeout: 2s
    path: /health

storage:
  # Per-region storage configuration
  hot_tier:
    type: redis-cluster
    nodes_per_region: 6  # 3 master + 3 replica
  
  cold_tier:
    type: s3
    replication: cross-region
    
  snapshots:
    replication: inter-region
    retention_days: 30

network:
  vpc_peering: true
  private_link: true
  encryption: tls-1.3
  
monitoring:
  metrics_export: prometheus
  tracing: jaeger
  logs: elasticsearch
  alerts:
    - name: high-latency
      condition: p99 > 100ms
      duration: 5m
      severity: warning
    - name: region-down
      condition: region_health == 0
      duration: 1m
      severity: critical
