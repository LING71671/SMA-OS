# Enterprise SLA Configuration for SMA-OS
# Phase 4.5: Enterprise Support and SLA

# Service Level Agreements
slas:
  # Community Tier (Free)
  community:
    availability: 99.0%
    response_time_p99: 10000ms
    support_hours: community
    support_channels:
      - github_issues
    incident_response: best_effort
    data_retention: 7_days
    backup_frequency: none
    
  # Starter Tier
  starter:
    availability: 99.5%
    response_time_p99: 5000ms
    support_hours: business_hours
    support_channels:
      - email
      - github_issues
    incident_response: 24_hours
    data_retention: 30_days
    backup_frequency: daily
    price_per_month: 99
    
  # Professional Tier
  professional:
    availability: 99.9%
    response_time_p99: 2000ms
    support_hours: extended
    support_channels:
      - email
      - chat
      - github_issues
    incident_response: 4_hours
    data_retention: 90_days
    backup_frequency: hourly
    price_per_month: 499
    
  # Enterprise Tier
  enterprise:
    availability: 99.99%
    response_time_p99: 500ms
    support_hours: 24_7
    support_channels:
      - email
      - phone
      - chat
      - slack
      - dedicated_support
    incident_response: 1_hour
    data_retention: 365_days
    backup_frequency: continuous
    price_per_month: 1999
    
    # Enterprise-only features
    features:
      - dedicated_infrastructure
      - custom_regions
      - private_endpoints
      - audit_logging
      - sso_integration
      - custom_contracts

# Support Channels
support_channels:
  github_issues:
    name: "GitHub Issues"
    availability: "24/7"
    
  email:
    name: "Email Support"
    address: "support@sma-os.io"
    
  chat:
    name: "Live Chat"
    availability: "business_hours"
    
  phone:
    name: "Phone Support"
    number: "+1-800-SMA-OS"
    availability: "24/7"
    
  slack:
    name: "Slack Connect"
    availability: "24/7"
    
  dedicated_support:
    name: "Dedicated Support Engineer"
    availability: "24/7"

# Incident Response Procedures
incident_response:
  severity_levels:
    critical:
      definition: "Service outage affecting all users"
      response_sla: "15 minutes"
      resolution_sla: "4 hours"
      
    high:
      definition: "Significant performance degradation"
      response_sla: "1 hour"
      resolution_sla: "24 hours"
      
    medium:
      definition: "Partial functionality impact"
      response_sla: "4 hours"
      resolution_sla: "72 hours"
      
    low:
      definition: "Minor issues or questions"
      response_sla: "24 hours"
      resolution_sla: "1 week"

# Compliance and Audit
compliance:
  audit_logging:
    enabled: true
    retention_days: 2555  # 7 years
    
  data_residency:
    available_regions:
      - us
      - eu
      - asia
    default: us
    
  certifications:
    - soc2_type2
    - iso27001
    - gdpr
    - hipaa

# Enterprise Billing
billing:
  currency: USD
  
  payment_methods:
    - credit_card
    - invoice
    - ach
    
  billing_cycles:
    - monthly
    - annual
    - custom
    
  discounts:
    annual_commitment: 0.15  # 15% off for annual
    volume_tier1: 0.05      # 5% off for 10+ seats
    volume_tier2: 0.10      # 10% off for 50+ seats
    volume_tier3: 0.20      # 20% off for 100+ seats
    
# Service Credits
service_credits:
  # Percentage of monthly fee credited for downtime
  availability_99_0: 0.10   # 10% credit
  availability_95_0: 0.25 # 25% credit
  availability_90_0: 0.50 # 50% credit
  availability_below_90: 1.00 # 100% credit