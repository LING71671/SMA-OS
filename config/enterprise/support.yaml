# Enterprise Support Configuration
# Phase 4.5: Enterprise Support

support_portal:
  url: https://support.sma-os.io
  sso:
    enabled: true
    providers:
      - oidc
      - saml
      - oauth2
  
  knowledge_base:
    enabled: true
    public_articles: true
    custom_articles: true
    
  community:
    forums: true
    discord: https://discord.gg/sma-os
    slack: false  # Enterprise only

# Escalation Matrix
escalation:
  level_1:
    name: "L1 Support"
    role: "Support Engineer"
    response_sla: "1 hour"
    can_escalate_to: ["level_2"]
    
  level_2:
    name: "L2 Support"
    role: "Senior Engineer"
    response_sla: "4 hours"
    can_escalate_to: ["level_3", "engineering"]
    
  level_3:
    name: "L3 Support"
    role: "Principal Engineer"
    response_sla: "24 hours"
    can_escalate_to: ["engineering", "executive"]
    
  engineering:
    name: "Engineering Team"
    role: "Core Team"
    response_sla: "48 hours"
    
  executive:
    name: "Executive"
    role: "CTO/VP"
    response_sla: "72 hours"

# Runbooks
runbooks:
  incident_response:
    - name: "Database Outage"
      severity: critical
      steps:
        - "Check database health metrics"
        - "Verify backup availability"
        - "Initiate failover to replica"
        - "Notify stakeholders"
        
    - name: "High Latency"
      severity: high
      steps:
        - "Check infrastructure metrics"
        - "Identify bottleneck"
        - "Scale affected services"
        - "Monitor recovery"

# Customer Success
customer_success:
  health_checks:
    frequency: weekly
    metrics:
      - usage
      - performance
      - adoption
      
  quarterly_reviews:
    enabled: true
    deliverables:
      - usage_report
      - optimization_recommendations
      - roadmap_alignment
      
  training:
    onboarding:
      - platform_overview
      - security_best_practices
      - custom_executor_development
      
    advanced:
      - architecture_design
      - performance_tuning
      - disaster_recovery

# Monitoring and Alerting
monitoring:
  dashboards:
    - customer_health
    - support_metrics
    - sla_compliance
    
  alerts:
    - name: "SLA Breach Risk"
      condition: "availability < 99.9%"
      severity: high
      
    - name: "Support Queue Overflow"
      condition: "open_tickets > 100"
      severity: medium

# Legal and Compliance
legal:
  master_service_agreement: https://sma-os.io/legal/msa
  data_processing_agreement: https://sma-os.io/legal/dpa
  acceptable_use_policy: https://sma-os.io/legal/aup
  
  custom_contracts:
    available_for: ["enterprise"]
    requires_legal_review: true
    
  gdpr:
    dpo_contact: dpo@sma-os.io
    data_processor: SMA-OS Inc.
    
# Partnerships
partners:
  systems_integrators:
    - name: "Example SI"
      regions: ["US", "EU"]
      specializations: ["financial", "healthcare"]
      
  cloud_providers:
    - name: "AWS"
      status: preferred
      regions: ["us-east", "us-west", "eu-west", "ap-southeast"]
      
    - name: "Azure"
      status: supported
      regions: ["us-east", "eu-west"]
      
    - name: "GCP"
      status: supported
      regions: ["us-central", "eu-west"]